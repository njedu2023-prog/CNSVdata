name: Daily quality check

on:
  workflow_dispatch:
  schedule:
    # 19:10 Beijing time / 11:10 UTC, Monday-Friday
    - cron: "10 11 * * 1-5"

permissions:
  contents: write

jobs:
  daily-quality:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python scripts/build_daily_manifest.py
      - run: python scripts/build_daily_ready.py
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/daily data/quality/daily metadata/daily
          git diff --cached --quiet || git commit -m "data: update daily quality contract"
          git push
