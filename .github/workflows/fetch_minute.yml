name: Fetch minute data

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-minute:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python scripts/fetch_cnsv_1min.py
        env:
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
      - run: python scripts/build_preview_csv.py
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/raw data/processed/cnsv_1min.parquet data/preview
          git diff --cached --quiet || git commit -m "data: update cnsv 1min data"
          git push
