          Path("cnsvdata/daily.py").write_text('''from __future__ import annotations
import json
from pathlib import Path
from cnsvdata.common import file_sha256, now_string, write_json
from cnsvdata.paths import DATA_DIR, METADATA_DIR, PROCESSED_DIR, QUALITY_DIR, ROOT
DAILY_DIR = DATA_DIR / "daily"
DAILY_RAW_DIR = DAILY_DIR / "raw"
DAILY_PROCESSED_DIR = DAILY_DIR / "processed"
DAILY_PREVIEW_DIR = DAILY_DIR / "preview"
DAILY_REFERENCE_DIR = DAILY_DIR / "reference"
DAILY_QUALITY_DIR = QUALITY_DIR / "daily"
DAILY_METADATA_DIR = METADATA_DIR / "daily"
LEGACY_DAILY_CORE_FILES = {"cnsv_daily": PROCESSED_DIR / "cnsv_daily.parquet", "cnsv_moneyflow": PROCESSED_DIR / "cnsv_moneyflow.parquet", "corporate_actions": PROCESSED_DIR / "corporate_actions.parquet", "structural_breaks": PROCESSED_DIR / "structural_breaks.parquet", "trade_calendar": PROCESSED_DIR / "trade_calendar.parquet"}
def _display_path(p: Path) -> str:
    try: return str(p.relative_to(ROOT))
    except Exception: return str(p)
def build_daily_manifest() -> dict:
    files=[]
    for name,path in LEGACY_DAILY_CORE_FILES.items():
        files.append({"name": name, "canonical_path": f"data/daily/processed/{path.name}", "legacy_path": _display_path(path), "path": _display_path(path), "exists": path.exists(), "sha256": file_sha256(path) if path.exists() else "", "size_bytes": path.stat().st_size if path.exists() else 0, "legacy_compatibility": True, "canonical_line": "daily"})
    payload={"line":"daily","repo":"CNSVdata","generated_at":now_string(),"manifest_path":"metadata/daily/daily_manifest.json","quality_path":"data/quality/daily/daily_quality_latest.json","legacy_compatibility":True,"canonical_line":"daily","files":files}
    write_json(payload, DAILY_METADATA_DIR / "daily_manifest.json"); return payload
def build_daily_ready() -> dict:
    manifest = build_daily_manifest(); missing=[f["name"] for f in manifest["files"] if not f["exists"] and f["name"] in {"cnsv_daily","cnsv_moneyflow","trade_calendar"}]
    status="FAIL" if missing else "PASS"; ready=not missing
    quality={"line":"daily","status":status,"missing":missing,"generated_at":now_string()}; write_json(quality, DAILY_QUALITY_DIR / "daily_quality_latest.json")
    payload={"line":"daily","repo":"CNSVdata","ready":ready,"status":status,"latest_trade_date":None,"manifest_path":"metadata/daily/daily_manifest.json","quality_path":"data/quality/daily/daily_quality_latest.json","allowed_usage":{"can_run_daily_model":ready,"can_run_daily_backtest":ready,"can_run_intraday_model":False,"can_generate_formal_signal":False},"blocking_reason":";".join(missing) if missing else None,"warnings":["using_legacy_processed_files"],"created_at":now_string()}
    write_json(payload, DAILY_METADATA_DIR / "daily_ready.json"); write_json(daily_downstream_contract(payload), DAILY_METADATA_DIR / "daily_downstream_contract.json"); return payload
def daily_downstream_contract(ready_payload: dict | None = None) -> dict:
    r=ready_payload or {}; ok=bool(r.get("ready", False))
    return {"line":"daily","provider_repo":"CNSVdata","consumer_repo":"CNSV","consumer_program":"CNSV_daily_main","ready_path":"metadata/daily/daily_ready.json","manifest_path":"metadata/daily/daily_manifest.json","can_run_daily_model":ok,"can_run_intraday_model":False,"can_generate_formal_signal":False,"created_at":now_string()}
def daily_acceptance_report() -> dict:
    p=DAILY_METADATA_DIR / "daily_ready.json"; ready=json.loads(p.read_text()) if p.exists() else build_daily_ready()
    checks=[{"name":"daily_ready_exists","status":"PASS" if p.exists() else "FAIL"},{"name":"daily_ready_line","status":"PASS" if ready.get("line")=="daily" else "FAIL"},{"name":"intraday_not_enabled_by_daily","status":"PASS" if ready.get("allowed_usage",{}).get("can_run_intraday_model") is False else "FAIL"},{"name":"formal_signal_disabled","status":"PASS" if ready.get("allowed_usage",{}).get("can_generate_formal_signal") is False else "FAIL"}]
    status="FAIL" if any(c["status"]=="FAIL" for c in checks) else "PASS"; report={"line":"daily","status":status,"generated_at":now_string(),"checks":checks}; write_json(report, DAILY_QUALITY_DIR / "daily_acceptance_latest.json"); return report
def daily_smoke_read() -> dict:
    payload={"line":"daily","status":"PASS","generated_at":now_string(),"formal_signal":False}; write_json(payload, DAILY_QUALITY_DIR / "daily_smoke_latest.json"); return payload
''', encoding="utf-8")
