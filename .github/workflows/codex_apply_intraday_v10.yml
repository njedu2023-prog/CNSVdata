ML_ROOT = DATA_DIR / "ml_dataset" / "t1_intraday"
PREVIEW_ROOT = DATA_DIR / "preview" / "intraday"'''
          new_paths = '''INTRADAY_DIR = DATA_DIR / "intraday"
INTRADAY_RAW_DIR = INTRADAY_DIR / "raw"
INTRADAY_RAW_PATH = INTRADAY_RAW_DIR / "cnsv_1min_intraday_1400.parquet"
