    if not snaps.empty and not ref.empty:
        for code, daily in ref.groupby("ts_code"):
            dates = daily.sort_values("trade_date")["trade_date"].tolist(); close_map = daily.set_index("trade_date")["close"].to_dict(); nxt = {d: dates[i + 1] for i, d in enumerate(dates[:-1])}
            for _, snap in snaps[snaps.get("ts_code", code) == code].iterrows():
                td = compact_trade_date(snap.get("trade_date", "")); asof = pd.to_numeric(snap.get("asof_price_1400"), errors="coerce"); nd = nxt.get(td, ""); nc = close_map.get(nd) if nd else None
                ready = bool(nd and pd.notna(asof) and pd.notna(nc)); ret = nc / asof - 1 if ready and asof else pd.NA
                rows.append({"trade_date": td, "ts_code": code, "asof_time": ASOF_TIME_SHORT, "asof_price_1400": asof, "next_trade_date": nd, "next_close": nc if ready else pd.NA, "actual_return_vs_1400": ret, "actual_up_label": int(ret > 0) if pd.notna(ret) else pd.NA, "actual_down_label": int(ret < 0) if pd.notna(ret) else pd.NA, "actual_flat_label": int(abs(ret) <= FLAT_THRESHOLD) if pd.notna(ret) else pd.NA, "actual_limitup_label": int(ret >= 0.099) if pd.notna(ret) else pd.NA, "truth_ready": ready, "truth_status": "PASS" if ready else "WARN", "created_at": now_string()})
    truth = pd.DataFrame(rows, columns=LABEL_COLUMNS)
    LABEL_ROOT.mkdir(parents=True, exist_ok=True); write_parquet(truth, LABEL_ROOT / "t1_truth_vs_1400_latest.parquet"); truth.to_csv(LABEL_ROOT / "t1_truth_vs_1400_latest.csv", index=False, encoding="utf-8-sig")
