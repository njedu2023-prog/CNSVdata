          s = replace_func(s, "check_trainset_no_future_leak", '''def check_trainset_no_future_leak(trainset: pd.DataFrame) -> dict:
    columns = set(trainset.columns); forbidden = sorted(columns & PREDICTION_FORBIDDEN_NAMES)
    bad_features = [c for c in trainset.columns if c.startswith("feature_") and any(x in c for x in ["next_", "actual_", "label", "created_at"])]
    checks = [{"name": "no_prediction_columns", "status": "FAIL" if forbidden else "PASS", "forbidden_columns": forbidden}, {"name": "feature_names_no_label_or_future", "status": "FAIL" if bad_features else "PASS", "bad_feature_columns": bad_features}, {"name": "feature_version_present", "status": "PASS" if "feature_version" in columns else "FAIL"}, {"name": "label_version_present", "status": "PASS" if "label_version" in columns else "FAIL"}, {"name": "professional_feature_columns_present", "status": "PASS" if set(FEATURE_COLUMNS).issubset(columns) else "FAIL"}]
    return {"line": "intraday_1400", "status": "FAIL" if any(c["status"] == "FAIL" for c in checks) else "PASS", "generated_at": now_string(), "rows": int(len(trainset)), "checks": checks}
