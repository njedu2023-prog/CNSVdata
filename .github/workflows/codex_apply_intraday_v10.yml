          s = replace_func(s, "build_t1_intraday_trainset", '''def build_t1_intraday_trainset() -> pd.DataFrame:
    truth = pd.read_parquet(LABEL_ROOT / "t1_truth_vs_1400_latest.parquet") if (LABEL_ROOT / "t1_truth_vs_1400_latest.parquet").exists() else build_t1_truth()
    rows = []
    for _, r in truth.iterrows():
        if not bool(r.get("truth_ready")): continue
        row = {c: r.get(c) for c in LABEL_COLUMNS if c not in {"truth_ready", "truth_status"}}
        row.update({c: 0.0 for c in FEATURE_COLUMNS}); row.update({"feature_version": FEATURE_VERSION, "label_version": LABEL_VERSION, "created_at": now_string()}); rows.append(row)
