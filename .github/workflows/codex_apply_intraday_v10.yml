name: Codex apply intraday isolation V1.0

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/codex_apply_intraday_v10.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Apply CNSVdata intraday/daily isolation patch
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          def replace_func(text, name, body):
              pat = rf"^def {name}\(.*?)(?=^def \w|^@dataclass|\Z)"
              new, n = re.subn(pat, body.rstrip() + "\n", text, count=1, flags=re.S | re.M)
              if n != 1:
                  raise SystemExit(f"function not found: {name}")
              return new

          p = Path("cnsvdata/intraday.py")
          s = p.read_text(encoding="utf-8")
          s = s.replace("from cnsvdata.paths import DATA_DIR, METADATA_DIR, PROCESSED_DIR, QUALITY_DIR, ROOT", "from cnsvdata.paths import DATA_DIR, METADATA_DIR, QUALITY_DIR, ROOT")
          s = s.replace('FLAT_THRESHOLD = 0.002\n', '''FLAT_THRESHOLD = 0.002
MISSING_SOURCE_REASON = "missing_intraday_minute_source"
INSUFFICIENT_HISTORY_REASON = "insufficient_intraday_history"
FEATURE_COLUMNS = ["feature_return_from_open_to_1400", "feature_return_from_vwap_to_1400", "feature_high_drawdown_until_1400", "feature_low_rebound_until_1400", "feature_intraday_volatility_until_1400", "feature_volume_until_1400", "feature_amount_until_1400", "feature_morning_volume_ratio", "feature_afternoon_volume_ratio", "feature_vwap_deviation", "feature_price_slope_morning", "feature_price_slope_afternoon", "feature_volume_slope_afternoon", "feature_range_until_1400", "feature_close_position_until_1400"]
LABEL_COLUMNS = ["trade_date", "ts_code", "asof_time", "asof_price_1400", "next_trade_date", "next_close", "actual_return_vs_1400", "actual_up_label", "actual_down_label", "actual_flat_label", "actual_limitup_label", "truth_ready", "truth_status", "created_at"]
TRAINSET_COLUMNS = ["trade_date", "ts_code", "asof_time", "asof_price_1400", "next_trade_date", "next_close", "actual_return_vs_1400", "actual_up_label", "actual_down_label", "actual_flat_label", "actual_limitup_label", *FEATURE_COLUMNS, "feature_version", "label_version", "created_at"]
''')
          old_paths = '''INTRADAY_DIR = DATA_DIR / "intraday"
SNAPSHOT_ROOT = INTRADAY_DIR / "snapshots"
REPLAY_ROOT = INTRADAY_DIR / "replay"
