    reason = [c["name"] for c in quality.get("checks", []) if c.get("status") == "FAIL"] + (["manifest_missing_files"] if missing else [])
    return {"line": "intraday_1400", "project": "CNSV intraday", "repo": "CNSVdata", "trade_date": manifest.get("trade_date", ""), "asof_time": ASOF_TIME_SHORT, "ready": ready, "status": status, "reason": reason, "blocking_reason": ";".join(reason) if not ready else None, "latest_snapshot_path": str(paths.root.relative_to(ROOT)) + "/", "quality_path": str(paths.quality.relative_to(ROOT)), "manifest_path": "metadata/intraday/intraday_manifest_1400.json", "allowed_usage": {"can_run_daily_model": False, "can_run_intraday_model": ready, "can_run_intraday_forecast": ready, "can_run_backtest": False, "can_train_model": False, "can_generate_formal_signal": False}, "created_at": now_string()}
