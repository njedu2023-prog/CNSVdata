ML_ROOT = INTRADAY_DIR / "ml_dataset" / "t1_intraday"
PREVIEW_ROOT = INTRADAY_DIR / "preview"'''
          s = s.replace(old_paths, new_paths)
          s = s.replace('path = calendar_path or PROCESSED_DIR / "trade_calendar.parquet"', 'path = calendar_path or TRADE_CALENDAR_REFERENCE_PATH')
          s = replace_func(s, "read_source_minutes", '''def read_source_minutes() -> pd.DataFrame:
