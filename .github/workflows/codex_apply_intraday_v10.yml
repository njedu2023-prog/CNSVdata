    write_json(payload, INTRADAY_METADATA_DIR / "intraday_ready_1400.json")
    write_json({"line": "intraday_1400", "status": "FAIL", "reason": [reason], "generated_at": now_string()}, INTRADAY_QUALITY_DIR / "intraday_quality_latest.json")
    return payload

def build_t1_reference_from_daily(daily_df: pd.DataFrame) -> pd.DataFrame:
    ref = daily_df.copy()
    if "ts_code" not in ref.columns: ref["ts_code"] = _target().get("ts_code", "600150.SH")
    ref["trade_date"] = ref["trade_date"].astype(str).map(compact_trade_date)
