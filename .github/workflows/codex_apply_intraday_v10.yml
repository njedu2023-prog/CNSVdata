    return normalize_intraday_minutes(pd.read_parquet(INTRADAY_RAW_PATH), source=INTRADAY_RAW_PATH.name)
''')
          s = replace_func(s, "write_latest_intraday_minutes", '''def write_latest_intraday_minutes(df: pd.DataFrame) -> Path:
    out = INTRADAY_RAW_PATH
    merged = normalize_intraday_minutes(df)
    if out.exists(): merged = normalize_intraday_minutes(pd.concat([pd.read_parquet(out), merged], ignore_index=True), source="merged")
