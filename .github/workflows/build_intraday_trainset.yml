name: Build intraday trainset

on:
  workflow_dispatch:
  schedule:
    # 10:00 Beijing time / 02:00 UTC, Saturday
    - cron: "0 2 * * 6"

permissions:
  contents: write

jobs:
  build-intraday-trainset:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
      CNSVDATA_INTRADAY_HISTORY_DAYS: "150"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python scripts/replay_intraday_1400_history.py
      - run: python scripts/build_t1_truth_vs_1400.py
      - run: python scripts/build_t1_intraday_trainset.py
      - run: python scripts/build_intraday_preview_csv.py
      - run: python scripts/intraday_acceptance_check.py
      - run: pytest
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/intraday data/quality/intraday metadata/intraday
          git diff --cached --quiet || git commit -m "data: refresh intraday replay trainset"
          git push
