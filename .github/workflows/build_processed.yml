name: Build processed data

on:
  workflow_dispatch:
  schedule:
    - cron: "10 11 * * 1-5"

permissions:
  contents: write

jobs:
  build-processed:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python scripts/build_processed_daily.py
      - run: python scripts/build_minute_bars.py
      - run: python scripts/build_corporate_actions.py
      - run: python scripts/build_structural_breaks.py
      - run: python scripts/build_daily_manifest.py
      - run: python scripts/build_daily_ready.py
      - run: python scripts/build_data_manifest.py
      - run: python scripts/build_preview_csv.py
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/daily data/quality/daily metadata/daily metadata/latest_trade_date.json metadata/next_trade_date.json metadata/data_manifest.json metadata/data_snapshot.json
          git diff --cached --quiet || git commit -m "data: build processed cnsv data"
          git push
