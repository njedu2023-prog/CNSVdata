name: Acceptance

on:
  workflow_dispatch:
  schedule:
    - cron: "50 8 * * 1-5"

permissions:
  contents: write

jobs:
  acceptance:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: pytest
      - run: python scripts/detect_data_gaps.py
      - run: python scripts/quality_check.py
        if: always()
      - run: python scripts/build_data_manifest.py
        if: always()
      - run: python scripts/acceptance_check.py
        if: always()
      - run: python scripts/smoke_downstream_read.py
        if: always()
      - run: python scripts/build_downstream_ready.py
        if: always()
      - run: python scripts/build_failure_summary.py
        if: always()
      - run: python scripts/archive_quality_snapshot.py
        if: always()
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/quality metadata
          git diff --cached --quiet || git commit -m "data: update acceptance and quality snapshots"
          git push
        if: always()
      - name: Fail if downstream is not ready
        if: always()
        run: |
          python -c "import json, pathlib, sys; p=pathlib.Path('metadata/downstream_ready.json'); payload=json.loads(p.read_text(encoding='utf-8')) if p.exists() else {'status':'FAIL','blocking_reason':'missing downstream_ready.json'}; print('downstream_ready:', payload.get('status'), payload.get('blocking_reason', '')); sys.exit(1 if payload.get('status') == 'FAIL' or payload.get('ready') is False else 0)"
